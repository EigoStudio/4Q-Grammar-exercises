<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21章 許可・依頼 予想問題</title>
<style>
  :root {
    --primary-blue: #0288d1;
    --text-dark: #333;
    --bg-color: #f0f7ff;
    --border-color: #b3e5fc;
  }

  body {
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", sans-serif;
    background-color: var(--bg-color);
    margin: 0; padding: 20px;
    display: flex; flex-direction: column; align-items: center;
  }

  .container {
    background: white; max-width: 850px; width: 100%;
    padding: 30px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }

  h2 { color: var(--primary-blue); text-align: center; }

  .progress-container { width: 100%; background: #eee; border-radius: 10px; margin-bottom: 20px; height: 8px; }
  .progress-bar { height: 100%; background: var(--primary-blue); width: 0%; transition: width 0.3s; }

  .question-display {
    font-size: 1.3rem; line-height: 1.8; margin-bottom: 25px; padding: 25px;
    background: #f9f9f9; border-radius: 15px; border-left: 6px solid var(--primary-blue);
    min-height: 80px;
  }

  .listening-mode {
    background: #263238; color: #fff; text-align: center; border-left: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  .script-review { display: none; text-align: left; width: 100%; margin-top: 15px; border-top: 1px solid #546e7a; padding-top: 15px; font-size: 1.1rem; }

  .dialog-line { display: block; margin-bottom: 12px; }
  .speaker-m { color: #1565c0; font-weight: bold; margin-right: 5px; }
  .speaker-w { color: #c2185b; font-weight: bold; margin-right: 5px; }

  .tts-btn {
    background: #ff9100; color: white; border: none; padding: 12px 25px; border-radius: 30px;
    cursor: pointer; font-size: 1.1rem; font-weight: bold; box-shadow: 0 4px 0 #ef6c00;
    margin-bottom: 10px; transition: 0.1s;
  }
  .tts-btn:active { transform: translateY(2px); box-shadow: none; }

  .choice-grid { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 12px; 
    width: 100%;
  }
  .choice-card-btn {
    padding: 18px; border: 2px solid var(--border-color); background: white;
    border-radius: 12px; cursor: pointer; font-size: 1.2rem; font-weight: bold; text-align: left;
    box-sizing: border-box;
  }
  .choice-card-btn:hover { background-color: #e1f5fe; }
  .choice-card-btn.selected { background: var(--border-color); border-color: var(--primary-blue); }

  .action-btn { padding: 15px 50px; font-size: 1.2rem; border-radius: 35px; cursor: pointer; border: none; font-weight: bold; margin: 20px auto; display: block; color: white; }

  @media (max-width: 600px) {
    .choice-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <h2>21章 許可・依頼 予想問題</h2>
  <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
  
  <div id="game-content">
    <div id="qArea" class="question-display"></div>
    <div id="ui-area" class="choice-grid"></div>
    <button class="action-btn" id="checkBtn" style="display:none; background: #2e7d32;" onclick="handleCheck()">Check Answer</button>
    <button class="action-btn" id="nextBtn" style="display:none; background: var(--primary-blue);" onclick="nextQuestion()">Next Question</button>
  </div>
</div>

<script>
  let voices = [];
  function setVoices() { 
    voices = window.speechSynthesis.getVoices(); 
  }
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = setVoices;
  }

  const quizData = [
    {
      type: "read",
      html: "<span class='dialog-line'><span class='speaker-w'>Girl 1:</span> My grandma sent me a lot of apples. ( &nbsp;&nbsp;&nbsp;&nbsp; ) Cathy?</span>" +
            "<span class='dialog-line'><span class='speaker-w'>Girl 2:</span> Sorry, I have to stay home today. How about tomorrow?</span>",
      choices: ["1. Can you come and get some,", "2. Do you eat apples,", "3. Can you give me apples,", "4. How much are they,"],
      ans: "1. Can you come and get some,"
    },
    {
      type: "read",
      html: "<span class='dialog-line'><span class='speaker-w'>Daughter:</span> Mom, I'm hungry. ( &nbsp;&nbsp;&nbsp;&nbsp; )</span>" +
            "<span class='dialog-line'><span class='speaker-w'>Mom:</span> Sure. But don't eat too much.</span>",
      choices: ["1. What are you making?", "2. Can I have chocolate?", "3. May I see your bag?", "4. Where is the kitchen?"],
      ans: "2. Can I have chocolate?"
    },
    {
      type: "read",
      html: "<span class='dialog-line'><span class='speaker-w'>Girl:</span> Is this your computer, Bill? Can I see it?</span>" +
            "<span class='dialog-line'><span class='speaker-m'>Boy:</span> ( &nbsp;&nbsp;&nbsp;&nbsp; ) I bought it yesterday.</span>",
      choices: ["1. No, thank you.", "2. It's not mine.", "3. You're welcome.", "4. Of course."],
      ans: "4. Of course."
    },
    {
      type: "listen",
      dialogue: [
        { gender: 'male', text: "Can you help me, Emily?" },
        { gender: 'female', text: "What's wrong, Mike?" },
        { gender: 'male', text: "I have to call Mr. Smith. Can I use your cell phone?" }
      ],
      script: "<b>Mike:</b> Can you help me, Emily?<br><b>Emily:</b> What's wrong, Mike?<br><b>Mike:</b> ... Can I use your cell phone?<br><b>Emily:</b> ( &nbsp;&nbsp;&nbsp;&nbsp; )",
      choices: ["1. I'll call you later.", "2. I want a new one.", "3. Sure. Here you are."],
      ans: "3. Sure. Here you are."
    },
    {
      type: "listen",
      dialogue: [
        { gender: 'female', text: "Did you enjoy the dinner, Tom?" },
        { gender: 'male', text: "Yes, everything was delicious. Where should I put the dishes?" },
        { gender: 'female', text: "Can you carry them to the kitchen?" }
      ],
      script: "<b>Woman:</b> Did you enjoy the dinner, Tom?<br><b>Tom:</b> ... Where should I put the dishes?<br><b>Woman:</b> Can you carry them to the kitchen?<br><b>Tom:</b> ( &nbsp;&nbsp;&nbsp;&nbsp; )",
      choices: ["1. Sorry, I'm hungry.", "2. Of course.", "3. I'll get the forks."],
      ans: "2. Of course."
    }
  ];

  let currentIdx = 0;
  let selectedChoice = null;

  async function playAudio() {
    window.speechSynthesis.cancel();
    for (let line of quizData[currentIdx].dialogue) {
      await new Promise(resolve => {
        const ut = new SpeechSynthesisUtterance(line.text);
        ut.rate = 0.85;
        
        let targetVoice;
        if (line.gender === 'male') {
          // 男声：イギリス英語（en-GB）を優先
          ut.lang = 'en-GB';
          targetVoice = voices.find(v => v.lang.includes('en-GB') && (v.name.includes('Male') || v.name.includes('George') || v.name.includes('James')));
          if (!targetVoice) { // GBが見つからない場合のバックアップ
             targetVoice = voices.find(v => v.name.includes('Male'));
          }
        } else {
          // 女声：アメリカ英語（en-US）を優先
          ut.lang = 'en-US';
          targetVoice = voices.find(v => v.lang.includes('en-US') && (v.name.includes('Female') || v.name.includes('Zira') || v.name.includes('Google US English')));
        }
        
        if (targetVoice) ut.voice = targetVoice;
        ut.onend = () => setTimeout(resolve, 600);
        window.speechSynthesis.speak(ut);
      });
    }
  }

  function loadQuestion() {
    const q = quizData[currentIdx];
    const qArea = document.getElementById('qArea');
    const ui = document.getElementById('ui-area');
    ui.innerHTML = "";
    selectedChoice = null;

    if (q.type === "read") {
      qArea.className = "question-display";
      qArea.innerHTML = q.html;
    } else {
      qArea.className = "question-display listening-mode";
      qArea.innerHTML = `<button class="tts-btn" onclick="playAudio()">🎧 Listen Audio (Question ${currentIdx + 1})</button><div id="review" class="script-review">${q.script}</div>`;
    }

    q.choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-card-btn';
      btn.textContent = c;
      btn.onclick = () => {
        document.querySelectorAll('.choice-card-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedChoice = c;
        document.getElementById('checkBtn').style.display = "block";
      };
      ui.appendChild(btn);
    });

    document.getElementById('progressBar').style.width = `${(currentIdx / quizData.length) * 100}%`;
    document.getElementById('checkBtn').style.display = "none";
    document.getElementById('nextBtn').style.display = "none";
  }

  function handleCheck() {
    const q = quizData[currentIdx];
    if (selectedChoice === q.ans) {
      if (q.type === "read") {
        document.getElementById('qArea').innerHTML = q.html.replace("( &nbsp;&nbsp;&nbsp;&nbsp; )", `<b style="color:red; text-decoration:underline;">${selectedChoice.substring(3)}</b>`);
      } else {
        const rev = document.getElementById('review');
        rev.style.display = "block";
        rev.innerHTML = q.script.replace("( &nbsp;&nbsp;&nbsp;&nbsp; )", `<b style="color:#ffeb3b; text-decoration:underline;">${selectedChoice.substring(3)}</b>`);
      }
      document.getElementById('checkBtn').style.display = "none";
      document.getElementById('nextBtn').style.display = "block";
    } else { alert("Try again!"); }
  }

  function nextQuestion() {
    currentIdx++;
    if (currentIdx < quizData.length) loadQuestion();
    else document.getElementById('game-content').innerHTML = "<h2 style='text-align:center;'>🎉 All Clear! 🎓</h2>";
  }

  window.onload = () => { 
    setVoices(); 
    loadQuestion(); 
  };
</script>
</body>
</html>
