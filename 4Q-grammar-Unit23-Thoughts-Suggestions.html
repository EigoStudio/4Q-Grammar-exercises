<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>23章 提案・感想を聞く表現</title>
<style>
  :root {
    --primary-blue: #0288d1;
    --success-green: #2e7d32;
    --text-dark: #333;
    --bg-color: #f0f7ff;
    --border-color: #b3e5fc;
  }

  body {
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", sans-serif;
    background-color: var(--bg-color);
    margin: 0; padding: 20px;
    display: flex; flex-direction: column; align-items: center;
  }

  .container {
    background: white; max-width: 850px; width: 100%;
    padding: 30px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    position: relative;
  }

  /* ① 進捗表示 */
  .progress-bar {
    text-align: right; font-size: 0.9rem; color: #666; margin-bottom: 10px;
    font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px;
  }

  h2 { color: var(--primary-blue); text-align: center; margin-top: 10px; }

  .dialog-line { display: block; margin-bottom: 10px; line-height: 1.6; }
  .question-box { 
    font-size: 1.4rem; 
    margin-bottom: 25px; padding: 20px; 
    background: #f9f9f9; border-radius: 10px; 
    border-left: 6px solid var(--primary-blue); 
  }

  .choice-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
  .choice-card-btn {
    padding: 18px; border: 2px solid var(--border-color); background: white;
    border-radius: 12px; cursor: pointer; font-size: 1.2rem;
    font-weight: bold; font-family: inherit; text-align: left; transition: 0.2s;
  }
  .choice-card-btn:hover { background-color: #e1f5fe; }
  .choice-card-btn.selected { background-color: var(--border-color); border-color: var(--primary-blue); }

  .word-btn {
    border: 2px solid var(--primary-blue); padding: 12px 22px; border-radius: 25px;
    margin: 6px; cursor: pointer; background: white; font-weight: bold;
    font-size: 1.3rem;
  }
  .word-btn.used { color: #ccc; border-color: #eee; }

  .answer-area {
    min-height: 70px; border-bottom: 3px solid var(--primary-blue);
    margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px;
    background-color: #fafafa; border-radius: 10px;
    font-size: 1.4rem;
  }

  .action-btn {
    padding: 15px 40px; font-size: 1.2rem; border-radius: 35px; cursor: pointer;
    border: none; font-weight: bold; margin: 10px auto; display: block;
  }

  /* ③ 正解メッセージ */
  .feedback-msg {
    text-align: center; font-size: 1.8rem; font-weight: bold; color: var(--success-green);
    margin: 20px 0; animation: pop 0.3s ease-out;
  }
  @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }

  /* ② ワークシート用レイアウト調整 */
  #worksheet-view { display: none; width: 100%; max-width: 750px; color: black; }
  .ws-section-title { font-weight: bold; border-left: 5px solid black; padding-left: 10px; margin: 25px 0 10px; font-size: 12pt; }
  
  .ws-question { 
    margin-bottom: 18px; font-size: 11pt; line-height: 1.6; 
    display: flex; align-items: flex-start; /* 横並び */
  }
  .ws-q-num { min-width: 25px; font-weight: bold; } /* 番号固定幅 */
  .ws-q-content { flex: 1; } /* 本文部分 */

  .ws-choices { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 5px; font-size: 11pt; }
  .ws-sort-area { margin-top: 20px; border-bottom: 1px solid black; min-height: 18px; }

  @media print {
    body { background: white; padding: 0; }
    .container { display: none !important; }
    #worksheet-view { display: block !important; }
    h2 { font-size: 16pt; margin-bottom: 15px; color: black; }
  }
</style>
</head>
<body>

<div class="container" id="quiz-container">
  <div class="progress-bar" id="progressText">Question: 1 / 20</div>
  <h2>23章 提案・感想を聞く表現</h2>
  <div id="game-content">
    <div class="question-box" id="qText"></div>
    <div id="ui-area"></div>
    <button class="action-btn" id="checkBtn" style="display:none; background: #2e7d32; color: white;" onclick="handleCheck()">Check Answer</button>
    <div id="feedback-area"></div>
    <button class="action-btn" id="nextBtn" style="display:none; background: #0277bd; color: white;" onclick="nextQuestion()">Next Question</button>
  </div>
</div>

<div id="worksheet-view">
  <h2 style="text-align: left; border-bottom: 2px solid black;">23章 提案・感想を聞く表現 (Eiken Grade 4)</h2>
  <div id="ws-content"></div>
</div>

<script>
  const choiceData = [
    { type: "choice", dialog: ["Clerk: ( &nbsp;&nbsp;&nbsp;&nbsp; ) this blue shirt?", "Customer: It's very nice. I'll take it."], choices: ["How about", "How was", "How is", "How do you"], ans: "How about" },
    { type: "choice", dialog: ["A: ( &nbsp;&nbsp;&nbsp;&nbsp; ) some orange juice?", "B: Yes, please. I'm thirsty."], choices: ["How about", "What was", "How do you", "Are you"], ans: "How about" },
    { type: "choice", dialog: ["A: How about this hat?", "B: ( &nbsp;&nbsp;&nbsp;&nbsp; )"], choices: ["It's beautiful!", "Yes, I do.", "I'm ten years old.", "By bus."], ans: "It's beautiful!" },
    { type: "choice", dialog: ["A: How about this bag?", "B: ( &nbsp;&nbsp;&nbsp;&nbsp; ) How much is it?"], choices: ["I like it!", "No, I'm not.", "That's right.", "Nice to meet you."], ans: "I like it!" },
    { type: "choice", dialog: ["A: ( &nbsp;&nbsp;&nbsp;&nbsp; ) playing tennis this afternoon?", "B: That's a good idea! Let's go."], choices: ["How about", "How do you", "What was", "Where are"], ans: "How about" },
    { type: "choice", dialog: ["A: How about ( &nbsp;&nbsp;&nbsp;&nbsp; ) to the library?", "B: Sounds good. I want to study."], choices: ["going", "go", "goes", "to go"], ans: "going" },
    { type: "choice", dialog: ["A: ( &nbsp;&nbsp;&nbsp;&nbsp; ) having lunch at the new cafe?", "B: Sure! I'm hungry."], choices: ["How about", "Would you", "Do you like", "What do"], ans: "How about" },
    { type: "choice", dialog: ["A: How about watching a movie tonight?", "B: ( &nbsp;&nbsp;&nbsp;&nbsp; )"], choices: ["Sounds good.", "Yes, I am.", "I watched it.", "It was fun."], ans: "Sounds good." },
    { type: "choice", dialog: ["A: I like dogs. ( &nbsp;&nbsp;&nbsp;&nbsp; )", "B: Me, too. They are cute."], choices: ["How about you?", "How was it?", "What do you do?", "How are you?"], ans: "How about you?" },
    { type: "choice", dialog: ["A: I want to eat pizza. ( &nbsp;&nbsp;&nbsp;&nbsp; )", "B: I want to eat curry."], choices: ["How about you?", "What was it?", "Who are you?", "How is it?"], ans: "How about you?" },
    { type: "choice", dialog: ["A: I'm very tired. How about you?", "B: ( &nbsp;&nbsp;&nbsp;&nbsp; )"], choices: ["I'm tired, too.", "That's fine.", "Yes, please.", "You're welcome."], ans: "I'm tired, too." },
    { type: "choice", dialog: ["A: I go to school by bus. ( &nbsp;&nbsp;&nbsp;&nbsp; )", "B: I go to school by train."], choices: ["How about you?", "Where is it?", "How was school?", "What about it?"], ans: "How about you?" },
    { type: "choice", dialog: ["A: ( &nbsp;&nbsp;&nbsp;&nbsp; ) the school trip?", "B: It was really fun!"], choices: ["How was", "How about", "How do", "What about"], ans: "How was" },
    { type: "choice", dialog: ["A: How was the movie?", "B: ( &nbsp;&nbsp;&nbsp;&nbsp; )"], choices: ["It was exciting!", "It is a movie.", "I'm fine.", "Yes, it was."], ans: "It was exciting!" },
    { type: "choice", dialog: ["A: ( &nbsp;&nbsp;&nbsp;&nbsp; ) your new bike?", "B: I love it! It's very fast."], choices: ["How do you like", "How was", "How about", "What do you"], ans: "How do you like" },
    { type: "choice", dialog: ["A: How was the math test?", "B: ( &nbsp;&nbsp;&nbsp;&nbsp; )"], choices: ["It was difficult.", "Yes, I did.", "I like math.", "Tomorrow."], ans: "It was difficult." }
  ];

  const sortData = [
    { type: "sort", ja: "新しい先生はどうですか？", en_full: "How do you like your new teacher?", words: ["How", "do", "you", "like", "your", "new", "teacher?"] },
    { type: "sort", ja: "日曜日に公園に行くのはどうですか？", en_full: "How about going to the park on Sunday?", words: ["How", "about", "going", "to", "the", "park", "on", "Sunday?"] },
    { type: "sort", ja: "新しいカバンはどうですか？", en_full: "How do you like your new bag?", words: ["How", "do", "you", "like", "your", "new", "bag?"] },
    { type: "sort", ja: "家でビデオゲームをするのはどうですか？", en_full: "How about playing video games at home?", words: ["How", "about", "playing", "video", "games", "at", "home?"] }
  ];

  function shuffle(array) {
    const newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
  }

  const quizData = [...shuffle(choiceData), ...shuffle(sortData)];
  let currentIdx = 0;
  let selectedChoice = null;
  let userSort = [];

  function loadQuestion() {
    const q = quizData[currentIdx];
    const ui = document.getElementById('ui-area');
    const qText = document.getElementById('qText');
    const feedbackArea = document.getElementById('feedback-area');
    document.getElementById('progressText').textContent = `Question: ${currentIdx + 1} / ${quizData.length}`;
    document.getElementById('nextBtn').style.display = "none";
    document.getElementById('checkBtn').style.display = "none";
    feedbackArea.innerHTML = "";
    ui.innerHTML = "";

    if (q.type === "choice") {
      qText.innerHTML = q.dialog.map(line => `<span class="dialog-line">${line}</span>`).join("");
      const grid = document.createElement('div');
      grid.className = 'choice-grid';
      shuffle(q.choices).forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-card-btn';
        btn.textContent = c;
        btn.onclick = () => {
          document.querySelectorAll('.choice-card-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedChoice = c;
          document.getElementById('checkBtn').style.display = "block";
        };
        grid.appendChild(btn);
      });
      ui.appendChild(grid);
    } else {
      qText.innerHTML = `<div style="font-weight:bold; color:var(--primary-blue);">${q.ja}</div>`;
      const area = document.createElement('div');
      area.className = 'answer-area';
      area.id = 'answerArea';
      area.innerHTML = '<span style="color:#aaa;">タップして並べ替え</span>';
      const bank = document.createElement('div');
      bank.style.textAlign = "center";
      userSort = [];
      shuffle(q.words).forEach(w => {
        const btn = document.createElement('button');
        btn.className = 'word-btn';
        btn.textContent = w;
        btn.onclick = () => {
          if (btn.classList.contains('used')) return;
          if (userSort.length === 0) area.innerHTML = "";
          userSort.push({ text: w, btn: btn });
          btn.classList.add('used');
          renderSort();
        };
        bank.appendChild(btn);
      });
      ui.appendChild(area);
      ui.appendChild(bank);
    }
  }

  function renderSort() {
    const area = document.getElementById('answerArea');
    area.innerHTML = "";
    userSort.forEach((item, idx) => {
      const b = document.createElement('button');
      b.className = 'word-btn';
      b.textContent = item.text;
      b.onclick = () => {
        item.btn.classList.remove('used');
        userSort.splice(idx, 1);
        renderSort();
      };
      area.appendChild(b);
    });
    document.getElementById('checkBtn').style.display = (userSort.length === quizData[currentIdx].words.length) ? "block" : "none";
  }

  function handleCheck() {
    const q = quizData[currentIdx];
    const feedbackArea = document.getElementById('feedback-area');
    const praises = ["Correct! 🌟", "Excellent! ✨", "Good Job! 👍", "Great! 🎉"];
    const randomPraise = praises[Math.floor(Math.random() * praises.length)];

    if (q.type === "choice") {
      if (selectedChoice === q.ans) {
        document.getElementById('qText').innerHTML = q.dialog.map(line => `<span class="dialog-line">${line.replace("( &nbsp;&nbsp;&nbsp;&nbsp; )", `<b style="color:red; text-decoration:underline;">${q.ans}</b>`)}</span>`).join("");
        feedbackArea.innerHTML = `<div class="feedback-msg">${randomPraise}</div>`;
        document.getElementById('checkBtn').style.display = "none";
        document.getElementById('nextBtn').style.display = "block";
      } else { alert("Try again!"); }
    } else {
      if (userSort.map(i => i.text).join(" ") === q.words.join(" ")) {
        document.getElementById('ui-area').innerHTML = `<p style="text-align:center; font-size:1.4rem; color:var(--text-dark);">${q.en_full}</p>`;
        feedbackArea.innerHTML = `<div class="feedback-msg">${randomPraise}</div>`;
        document.getElementById('checkBtn').style.display = "none";
        document.getElementById('nextBtn').style.display = "block";
      } else { alert("Check the order!"); }
    }
  }

  function nextQuestion() {
    currentIdx++;
    if (currentIdx < quizData.length) loadQuestion();
    else {
      document.getElementById('game-content').innerHTML = "<div class='feedback-msg'>🌟 All Done! 🌟<br>You mastered Unit 23!</div>";
    }
  }

  function generateWorksheet() {
    const ws = document.getElementById('ws-content');
    ws.innerHTML = '<div class="ws-section-title">【1】 Choose the best sentence or phrase for each ( &nbsp;&nbsp;&nbsp; ).</div>';
    
    choiceData.forEach((q, idx) => {
      const item = document.createElement('div');
      item.className = "ws-question";
      const dialogHtml = q.dialog.map(line => `<div>${line}</div>`).join("");
      const shuffledChoices = shuffle([...q.choices]);
      const choicesHtml = shuffledChoices.map((c, i) => `<span>(${i+1}) ${c}</span>`).join(" &nbsp; ");
      
      item.innerHTML = `
        <div class="ws-q-num">${idx + 1}.</div>
        <div class="ws-q-content">
          ${dialogHtml}
          <div class="ws-choices">${choicesHtml}</div>
        </div>`;
      ws.appendChild(item);
    });

    const sortTitle = document.createElement('div');
    sortTitle.className = "ws-section-title";
    sortTitle.innerHTML = '【2】 Put the words in the correct order.';
    ws.appendChild(sortTitle);

    sortData.forEach((q, idx) => {
      const item = document.createElement('div');
      item.className = "ws-question";
      item.innerHTML = `
        <div class="ws-q-num">${idx + 1}.</div>
        <div class="ws-q-content">
          ${q.ja} <br> 
          [ ${shuffle([...q.words]).join(" / ")} ]
          <div class="ws-sort-area"></div>
        </div>`;
      ws.appendChild(item);
    });
  }

  window.onload = () => {
    loadQuestion();
    generateWorksheet();
  };
</script>
</body>
</html>
