    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    color: #333;
  }

  .top-controls {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
  }

  .header-btn {
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);

  .print-launch-btn { background-color: #795548; }

  .container {
    background: white;
    max-width: 900px;
    width: 100%;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    min-height: 550px;
    margin-top: 40px;
  }

  h2 {
    color: #e65100;
    text-align: center;
    margin-bottom: 20px;
  }

  /* タブUIのスタイル */
  .tab-container {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
    flex-wrap: wrap;
  }

  .tab-btn {
    padding: 10px 18px;
    border: 2px solid var(--primary-orange);
    background-color: white;
    color: var(--text-brown);
    font-weight: bold;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.95rem;
    transition: all 0.2s;
    font-family: inherit;
  }

  .tab-btn:hover {
    background-color: #fff3e0;
  }

  .tab-btn.active {
    background-color: var(--primary-orange);
    color: white;
  }

  .progress-container {
    width: 100%;
    background-color: #eee;
    border-radius: 10px;
    margin-bottom: 10px;
    height: 8px;
  }
  .progress-bar {
    height: 100%;
    background-color: var(--primary-orange);
    width: 0%;
    transition: width 0.3s;
  }

  .progress-text {
    text-align: right;
    font-size: 0.9rem;
    color: var(--text-brown);
    font-weight: bold;
    margin-bottom: 20px;
  }

  .question-box {
    font-size: 1.3rem;
    line-height: 2.0;
    margin-bottom: 30px;
    text-align: left;
    min-height: 100px;
    font-family: inherit;
  }

  .choice-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-bottom: 20px;
  }

  .choice-card-btn {
    padding: 15px 10px;
    border: 2px solid var(--border-color);
    background: white;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1.1rem;
    text-align: center;
    color: var(--text-brown);
    transition: all 0.2s;
    font-family: inherit;
    font-weight: bold;
  }

  .choice-card-btn:hover {
    border-color: var(--primary-orange);
    background-color: #fffaf0;
  }

  .choice-card-btn.selected {
    border-color: var(--primary-orange);
    background-color: #fff3e0;
  }

    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 25px;

  .ox-btn {
    width: 120px;
    height: 90px;
    font-size: 2.5rem;
    font-weight: bold;
    border: 3px solid var(--border-color);
    background: white;
    border-radius: 20px;

    transition: all 0.2s;
    color: var(--text-brown);

    align-items: center;
    justify-content: center;
    font-family: inherit;

    border-color: var(--primary-orange);
    background-color: #fffaf0;
  }

  .ox-btn.selected {
    border-color: var(--primary-orange);
    background-color: #fff3e0;
  }

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .reason-card-btn {
    padding: 18px 10px;
    border: 2px solid var(--border-color);
    background: white;
    border-radius: 15px;
    cursor: pointer;
    font-size: 1.1rem;
    text-align: center;
    color: var(--text-brown);
    transition: all 0.2s;
    font-family: inherit;
    font-weight: bold;

  }

    border-color: var(--primary-orange);
    background-color: #fff3e0;

    padding: 12px 20px;
    border-radius: 25px;
    font-size: 1.2rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    margin: 6px;
    display: inline-block;
    font-family: inherit;

  .word-btn.used {
    border-color: #eee;
    color: #ccc;
    pointer-events: none;
  }

  .correct-word {
    color: #e74c3c;
    font-weight: bold;
    text-decoration: underline;
    margin: 0 5px;
  }

    padding: 15px;
    background-color: #fffafb;

    color: #2e7d32;
    font-weight: bold;
    text-align: center;

    line-height: 1.6;
    padding: 30px 0;
  }

  @keyframes popIn {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .action-btn {
    padding: 18px 50px;
    font-size: 1.2rem;
    background-color: #43a047;
    color: white;
    border: none;
    border-radius: 35px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 4px 0 #2e7d32;
    display: block;
    margin: 20px auto;
    font-family: inherit;
  }

  #printable-sheet { display: none; }

  @media (max-width: 600px) {
    .container { padding: 20px; }

    .celebration-text { font-size: 1.5rem; }
    .ox-btn { width: 90px; height: 70px; font-size: 2rem; }

    body {

      padding: 0;
      margin: 0;
      color: black;
      font-family: "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", "HGMaruGothicMPRO", sans-serif;

      max-width: 100% !important;
      display: block !important;

      max-width: 100% !important;

      text-align: center;
      border-bottom: 2px solid #333;
      margin-bottom: 20px;
      padding-bottom: 5px;
    }
    
    .sheet-title {
      font-size: 16pt;
      font-weight: bold;
      margin: 0 0 10px 0;
    }

    .section-title {
      font-size: 11pt;
      font-weight: bold;
      margin: 20px 0 12px 0;

      padding: 6px;
      border-left: 4px solid #333;

      margin-bottom: 22px;
      page-break-inside: avoid;
    }
    
    .q-text {
      font-size: 10.5pt;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    
    .q-line {
      border-bottom: 1px dashed #666;

      width: 98%;
      margin-bottom: 6px;

      font-size: 9.5pt;
      color: #444;
      font-style: normal;
      padding-left: 15px;
    }

      page-break-before: always;
      margin-top: 30px;
      border-top: 2px dashed #333;
      padding-top: 15px;
      font-size: 10pt;
    }
    
    .key-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    }

        print_base: "( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ) you going to join the contest this summer?",
        choices: ["Are", "Do", "Will", "Did"],
        ans: "Are",
        ja: "あなたはこの夏、コンテストに参加する予定ですか。"
      }
    ]
  };

  let currentSection = 'sort';
  let currentQuizList = [];
  let currentIdx = 0;

  // 状態管理変数
  let selectedChoice = null;
  let userSort = [];
  let errorStep = 1; // 1: ◯❌選び, 2: 理由選び
  let selectedOX = null;
  let selectedReasonIdx = null;

  function switchSection(secKey) {
    currentSection = secKey;
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.remove('active');
    });
    event.target.classList.add('active');
    
    currentQuizList = allQuizData[secKey];
    currentIdx = 0;
    loadQuestion();
  }

  function loadQuestion() {
    const q = currentQuizList[currentIdx];
    const ui = document.getElementById('ui-area');
    const qText = document.getElementById('qText');
    const feedback = document.getElementById('feedback-area');
    
    document.getElementById('progressBar').style.width = `${((currentIdx) / currentQuizList.length) * 100}%`;
    document.getElementById('progressText').textContent = `${currentIdx + 1} / ${currentQuizList.length} 問目`;
    
    document.getElementById('nextBtn').style.display = "none";
    document.getElementById('checkBtn').style.display = "none";
    feedback.innerHTML = "";
    ui.innerHTML = "";
    
    selectedChoice = null;
    selectedOX = null;
    selectedReasonIdx = null;
    errorStep = 1;

    if (q.type === "choice") {
      qText.innerHTML = `<div style="color:#ef6c00; font-size:1rem; margin-bottom:10px; font-weight:bold;">【選択問題】${q.ja}</div>` + q.base;
      const grid = document.createElement('div');
      grid.className = 'choice-grid';
      const shuffledChoices = shuffle([...q.choices]);
      shuffledChoices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-card-btn';
        btn.textContent = c;
        btn.onclick = () => {
          document.querySelectorAll('.choice-card-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedChoice = c;
          document.getElementById('checkBtn').style.display = "block";
        };
        grid.appendChild(btn);
      });
      ui.appendChild(grid);
    } else if (q.type === "error") {
      renderErrorStep1();
    } else {
      qText.innerHTML = `<div style="color:#e65100; font-size:1.2rem; margin-bottom:15px; font-weight:bold;">【並べ替え問題】${q.ja}</div>`;
      const area = document.createElement('div');
      area.className = 'answer-area';
      area.id = 'answerArea';
      area.innerHTML = '<span style="color:#aaa;">下のパーツをタップして並べ替えてね</span>';
      
      const bank = document.createElement('div');
      bank.style.textAlign = "center";
      
      userSort = [];
      const shuffledWords = shuffle([...q.words]);
      shuffledWords.forEach(w => {
        const btn = document.createElement('button');
        btn.className = 'word-btn';
        btn.textContent = w;
        btn.onclick = () => {
          if (btn.classList.contains('used')) return;
          if (userSort.length === 0) area.innerHTML = "";
          userSort.push({ text: w, btn: btn });
          btn.classList.add('used');
          renderSort();
        };
        bank.appendChild(btn);
      });
      ui.appendChild(area);
      ui.appendChild(bank);
    }
  }

  // 間違い探し：Step 1（◯ / ❌ の選択）
  function renderErrorStep1() {
    const q = currentQuizList[currentIdx];
    const qText = document.getElementById('qText');
    const ui = document.getElementById('ui-area');
    
    qText.innerHTML = `
      <div style="color:#e65100; font-size:1rem; margin-bottom:5px; font-weight:bold;">【間違い探し】この文は正しい？まちがい？</div>
      <div style="font-size: 1.25rem; color:#5d4037; font-weight:bold; margin-bottom:5px;">${q.sentence}</div>
      <div style="font-size: 0.95rem; color:#777;">（${q.ja}）</div>
    `;
    
    ui.innerHTML = "";
    const oxDiv = document.createElement('div');
    oxDiv.className = 'ox-grid';

    const btnO = document.createElement('button');
    btnO.className = 'ox-btn';
    btnO.textContent = '◯';
    btnO.onclick = () => {
      document.querySelectorAll('.ox-btn').forEach(b => b.classList.remove('selected'));
      btnO.classList.add('selected');
      selectedOX = true;
      document.getElementById('checkBtn').style.display = "block";
    };

    const btnX = document.createElement('button');
    btnX.className = 'ox-btn';
    btnX.textContent = '❌';
    btnX.onclick = () => {
      document.querySelectorAll('.ox-btn').forEach(b => b.classList.remove('selected'));
      btnX.classList.add('selected');
      selectedOX = false;
      document.getElementById('checkBtn').style.display = "block";
    };

    oxDiv.appendChild(btnO);
    oxDiv.appendChild(btnX);
    ui.appendChild(oxDiv);
  }

  // 間違い探し：Step 2（シンプルな直感的直し方 3択）
  function renderErrorStep2() {
    errorStep = 2;
    const q = currentQuizList[currentIdx];
    const qText = document.getElementById('qText');
    const ui = document.getElementById('ui-area');
    document.getElementById('checkBtn').style.display = "none";

    qText.innerHTML = `
      <div style="color:#d32f2f; font-size:1rem; margin-bottom:5px; font-weight:bold;">【間違い探し】どこをどう直す？</div>
      <div style="font-size: 1.25rem; color:#5d4037; font-weight:bold; margin-bottom:15px;">${q.sentence}</div>
    `;

    ui.innerHTML = "";
    const reasonDiv = document.createElement('div');
    reasonDiv.className = 'reason-grid';

    let indexedReasons = q.reasons.map((r, i) => ({ text: r, originalIndex: i }));
    let shuffledReasons = shuffle([...indexedReasons]);

    shuffledReasons.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'reason-card-btn';
      btn.textContent = item.text;
      btn.onclick = () => {
        document.querySelectorAll('.reason-card-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedReasonIdx = item.originalIndex;
        document.getElementById('checkBtn').style.display = "block";
      };
      reasonDiv.appendChild(btn);
    });

    ui.appendChild(reasonDiv);
  }

  function renderSort() {
    const area = document.getElementById('answerArea');
    area.innerHTML = "";
    userSort.forEach((item, idx) => {
      const b = document.createElement('button');
      b.className = 'word-btn';
      b.style.margin = "2px";
      b.textContent = item.text;
      b.onclick = () => {
        item.btn.classList.remove('used');
        userSort.splice(idx, 1);
        renderSort();
        if(userSort.length === 0) area.innerHTML = '<span style="color:#aaa;">下のパーツをタップして並べ替えてね</span>';
      };
      area.appendChild(b);
    });
    
    if (userSort.length === currentQuizList[currentIdx].words.length) {
      document.getElementById('checkBtn').style.display = "block";
    } else {
      document.getElementById('checkBtn').style.display = "none";
    }
  }

  function handleCheck() {
    const q = currentQuizList[currentIdx];

    if (q.type === "choice") {
      if (selectedChoice === q.ans) {
        if(document.getElementById('blank')) {
          document.getElementById('blank').innerHTML = `<span class="correct-word">${q.ans}</span>`;
        }
        showSuccess();
      } else {
        alert("もういちど考えてみよう！");
      }
    } else if (q.type === "error") {
      if (errorStep === 1) {
        if (selectedOX === q.isCorrect) {
          if (q.isCorrect === false) {
            renderErrorStep2();
          } else {
            showSuccess();
          }
        } else {
          alert("ざんねん！ もう一回よく見てみよう。");
        }
      } else if (errorStep === 2) {
        if (selectedReasonIdx === q.correctReasonIdx) {
          document.getElementById('ui-area').innerHTML = `
            <div class="celebration-text">
              ✨ 大正解！ ✨<br>
              <span style="font-size:1.3rem; color:#333; font-weight:normal;">正しい文：<b>${q.correctSentence}</b></span>
            </div>
          `;
          showSuccess();
        } else {
          alert("どこを直すか、もう一度考えてみよう！");
        }
      }
    } else {
      let userStr = userSort.map(i => i.text).join(" ");
      let cleanUser = userStr.replace(/[\.,\?]/g, "").toLowerCase().replace(/\s+/g, " ").trim();
      let cleanAns = q.en_full.replace(/[\.,\?]/g, "").toLowerCase().replace(/\s+/g, " ").trim();

      if (cleanUser === cleanAns) {
        document.getElementById('ui-area').innerHTML = `<div class="celebration-text">✨ ${q.en_full} ✨</div>`;
        showSuccess();
      } else {
        alert("語順を確認してね！");
      }
    }
  }

  function showSuccess() {
    document.getElementById('checkBtn').style.display = "none";
    document.getElementById('nextBtn').style.display = "block";
  }

  function nextQuestion() {
    currentIdx++;
    if (currentIdx < currentQuizList.length) loadQuestion();
    else {
      document.getElementById('game-content').innerHTML = "<div class='celebration-text'>🎉 このセクションをクリア！素晴らしい！ 🎉</div>";
      document.getElementById('progressBar').style.width = "100%";
      document.getElementById('progressText').textContent = `${currentQuizList.length} / ${currentQuizList.length} 問目`;
    }
  }

  function generatePrintSheet() {
    const contentDiv = document.getElementById('sheet-content');
    const answerDiv = document.getElementById('sheet-answers');
    
    contentDiv.innerHTML = "";
    answerDiv.innerHTML = "";

    // 第1部：並べ替え問題
    const sec1 = document.createElement('div');
    sec1.className = 'section-title';
    sec1.textContent = '【第1部】並べ替え問題：日本語の意味に合うように、[ ] 内のパーツを正しく並べ替えて英文を完成させなさい。';
    contentDiv.appendChild(sec1);

    allQuizData.sort.forEach((item, index) => {
      let shuffledWords = shuffle([...item.words]);
      const qBlock = document.createElement('div');
      qBlock.className = 'sheet-question';
      qBlock.innerHTML = `
        <div class="q-text">${index + 1}. ${item.ja}</div>
        <div class="q-line"></div>
        <div class="word-hint">語群：[ &nbsp;${shuffledWords.join(' &nbsp; / &nbsp; ')}&nbsp; ]</div>
      `;
      contentDiv.appendChild(qBlock);

      const aBlock = document.createElement('div');
      aBlock.className = 'key-item';
      aBlock.innerHTML = `<b>【第1部】（${index + 1}）</b> ${item.en_full}`;
      answerDiv.appendChild(aBlock);
    });

    // 第2部：間違い探し問題
    const sec2 = document.createElement('div');
    sec2.className = 'section-title';
    sec2.textContent = '【第2部】間違い探し問題：次の英文が正しければ◯、間違っていれば❌を書き、❌の場合は正しい英文に直しなさい。';
    contentDiv.appendChild(sec2);

    allQuizData.error.forEach((item, index) => {
      const qBlock = document.createElement('div');
      qBlock.className = 'sheet-question';
      qBlock.innerHTML = `
        <div class="q-text">${index + 1}. ( &nbsp;&nbsp;&nbsp;&nbsp; ) ${item.sentence}</div>
        <div class="q-line"></div>
      `;
      contentDiv.appendChild(qBlock);

      const aBlock = document.createElement('div');
      aBlock.className = 'key-item';
      let correctStr = item.isCorrect ? "◯ (正しい文)" : `❌ → ${item.correctSentence}`;
      aBlock.innerHTML = `<b>【第2部】（${index + 1}）</b> ${correctStr}`;
      answerDiv.appendChild(aBlock);
    });

    // 第3部：選択問題
    const sec3 = document.createElement('div');
    sec3.className = 'section-title';
    sec3.textContent = '【第3部】選択問題：カッコ( )内に入る最も適切な動詞の形を語群から選びなさい。';
    contentDiv.appendChild(sec3);

    allQuizData.choice.forEach((item, index) => {
      let printChoices = shuffle([...item.choices]);
      const qBlock = document.createElement('div');
      qBlock.className = 'sheet-question';
      qBlock.innerHTML = `
        <div class="q-text">${index + 1}. ${item.ja}</div>
        <div style="font-size:11pt; margin: 4px 0 4px 20px;">${item.print_base}</div>
        <div class="word-hint">選択肢：[ ${printChoices.join(' &nbsp;/ &nbsp;')} ]</div>
      `;
      contentDiv.appendChild(qBlock);

      const aBlock = document.createElement('div');
      aBlock.className = 'key-item';
      aBlock.innerHTML = `<b>【第3部】（${index + 1}）</b> ${item.ans}`;
      answerDiv.appendChild(aBlock);
    });
  }

  window.onload = function() {
    currentQuizList = allQuizData[currentSection];
    loadQuestion();
    generatePrintSheet();
  };
</script>
</body>
</html>
